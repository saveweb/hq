name: saveweb-hq

x-hq-image: &hq-image
  build:
    context: .
    args:
      VERSION: ${HQ_VERSION:-dev}
      COMMIT: ${HQ_COMMIT:-unknown}
  image: saveweb-hq:${HQ_VERSION:-dev}

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hq
      POSTGRES_USER: hq
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hq -d hq"]
      interval: 5s
      timeout: 3s
      retries: 20
    security_opt:
      - no-new-privileges:true

  tracker-init:
    <<: *hq-image
    user: "0:0"
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        mkdir -p /run/secrets
        chown 65532:65532 /run/secrets
        chmod 0700 /run/secrets
        test -s /run/secrets/github-client.secret
        if [ ! -e /run/secrets/tracker-web.secret ]; then
          /usr/local/bin/tracker web-keygen --out /run/secrets/tracker-web.secret
        fi
        chown 65532:65532 /run/secrets/github-client.secret /run/secrets/tracker-web.secret
        chmod 0600 /run/secrets/github-client.secret /run/secrets/tracker-web.secret
    volumes:
      - ./secrets:/run/secrets
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true

  tracker:
    <<: *hq-image
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      tracker-init:
        condition: service_completed_successfully
    environment:
      HQ_DATABASE_URL: postgres://hq@postgres:5432/hq?sslmode=disable
      HQ_PUBLIC_URL: ${HQ_PUBLIC_URL:-https://hq.saveweb.org}
      HQ_GITHUB_CLIENT_ID: ${HQ_GITHUB_CLIENT_ID:-}
      HQ_GITHUB_CLIENT_SECRET_FILE: /run/secrets/github-client.secret
      HQ_WEB_SESSION_SECRET_FILE: /run/secrets/tracker-web.secret
      HQ_OAUTH_ADMIN_ORG: ${HQ_OAUTH_ADMIN_ORG:-saveweb}
      HQ_OAUTH_ADMIN_TEAM: ${HQ_OAUTH_ADMIN_TEAM:-core}
    volumes:
      - ./secrets/github-client.secret:/run/secrets/github-client.secret:ro
      - ./secrets/tracker-web.secret:/run/secrets/tracker-web.secret:ro
    ports:
      - 127.0.0.74:8080:8080
    networks:
      - default
      - database
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s

networks:
  database:
    internal: true
