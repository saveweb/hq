name: saveweb-hq

x-hq-image: &hq-image
  build:
    context: .
    args:
      VERSION: ${HQ_VERSION:-dev}
      COMMIT: ${HQ_COMMIT:-unknown}
  image: saveweb-hq:${HQ_VERSION:-dev}

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hq
      POSTGRES_USER: hq
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hq -d hq"]
      interval: 5s
      timeout: 3s
      retries: 20
    security_opt:
      - no-new-privileges:true

  tracker:
    <<: *hq-image
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HQ_DATABASE_URL: postgres://hq@postgres:5432/hq?sslmode=disable
    ports:
      - 127.0.0.74:8080:8080
    networks:
      - default
      - database
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s

networks:
  database:
    internal: true
