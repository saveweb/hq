openapi: 3.1.0
info:
  title: SavewebHQ Project Queue API
  version: 1.0.0
  summary: Single-site PostgreSQL job coordination
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
security:
  - MachineToken: []
paths:
  /healthz:
    get:
      security: []
      operationId: health
      responses:
        '200':
          description: Process is alive
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [status]
                properties:
                  status: {type: string, const: ok}
  /api/v1/admin/projects:
    get:
      operationId: listAdminProjects
      description: Requires an active user with the admin role.
      responses:
        '200':
          description: Projects and queue counts
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AdminProjectListResponse'}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/admin/projects/{project_id}:
    parameters: [{$ref: '#/components/parameters/ProjectID'}]
    get:
      operationId: getAdminProject
      description: Requires an active user with the admin role.
      responses:
        '200':
          description: Project and queue counts
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AdminProjectSummary'}
        default: {$ref: '#/components/responses/Error'}
    put:
      operationId: putAdminProject
      description: Creates a project or updates its lifecycle status.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AdminProjectRequest'}
      responses:
        '200':
          description: Updated project
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AdminProjectSummary'}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/admin/projects/{project_id}/jobs:
    parameters: [{$ref: '#/components/parameters/ProjectID'}]
    post:
      operationId: enqueueAdminProjectJobs
      description: Idempotently inserts a bounded batch into a non-archived project.
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/AdminEnqueueJobsRequest'}
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema: {$ref: '#/components/schemas/AdminEnqueueJobsResponse'}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/projects/{project_id}/jobs/claim:
    parameters: [{$ref: '#/components/parameters/ProjectID'}]
    post:
      operationId: claimProjectJobs
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ProjectClaimRequest'}
      responses:
        '200':
          description: Claimed jobs
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ProjectClaimResponse'}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/projects/{project_id}/jobs/complete:
    parameters: [{$ref: '#/components/parameters/ProjectID'}]
    post:
      operationId: completeProjectJobs
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ProjectCompleteRequest'}
      responses:
        '200': {$ref: '#/components/responses/BatchResult'}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/projects/{project_id}/jobs/fail:
    parameters: [{$ref: '#/components/parameters/ProjectID'}]
    post:
      operationId: failProjectJobs
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ProjectFailRequest'}
      responses:
        '200': {$ref: '#/components/responses/BatchResult'}
        default: {$ref: '#/components/responses/Error'}
  /api/v1/projects/{project_id}/jobs/extend-lease:
    parameters: [{$ref: '#/components/parameters/ProjectID'}]
    post:
      operationId: extendProjectJobLeases
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ProjectExtendLeaseRequest'}
      responses:
        '200': {$ref: '#/components/responses/BatchResult'}
        default: {$ref: '#/components/responses/Error'}
components:
  securitySchemes:
    MachineToken: {type: http, scheme: bearer}
  parameters:
    ProjectID:
      name: project_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/Identifier'}
  responses:
    BatchResult:
      description: Per-item mutation results
      content:
        application/json:
          schema: {$ref: '#/components/schemas/BatchResultResponse'}
    Error:
      description: Request error
      content:
        application/json:
          schema: {$ref: '#/components/schemas/ErrorEnvelope'}
  schemas:
    Identifier: {type: string, minLength: 1, maxLength: 128, pattern: '^[A-Za-z0-9._:-]+$'}
    Attrs: {type: object, additionalProperties: true}
    JobCounts:
      type: object
      additionalProperties: false
      required: [todo, wip, done, failed, reset_exhausted]
      properties:
        todo: {type: integer, format: int64, minimum: 0}
        wip: {type: integer, format: int64, minimum: 0}
        done: {type: integer, format: int64, minimum: 0}
        failed: {type: integer, format: int64, minimum: 0}
        reset_exhausted: {type: integer, format: int64, minimum: 0}
    AdminProjectRequest:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status: {type: string, enum: [active, draining, archived]}
    AdminProjectSummary:
      type: object
      additionalProperties: false
      required: [id, status, job_counts, created_at, updated_at]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        status: {type: string, enum: [active, draining, archived]}
        job_counts: {$ref: '#/components/schemas/JobCounts'}
        created_at: {type: integer, format: int64}
        updated_at: {type: integer, format: int64}
    AdminProjectListResponse:
      type: object
      additionalProperties: false
      required: [projects]
      properties:
        projects: {type: array, items: {$ref: '#/components/schemas/AdminProjectSummary'}}
    AdminEnqueueJobsRequest:
      type: object
      additionalProperties: false
      required: [jobs]
      properties:
        jobs: {type: array, minItems: 1, maxItems: 256, items: {$ref: '#/components/schemas/JobSpec'}}
    AdminEnqueueJobsResponse:
      type: object
      additionalProperties: false
      required: [project_id, submitted, inserted]
      properties:
        project_id: {$ref: '#/components/schemas/Identifier'}
        submitted: {type: integer, minimum: 1, maximum: 256}
        inserted: {type: integer, format: int64, minimum: 0, maximum: 256}
    JobSpec:
      type: object
      additionalProperties: false
      required: [id, url, via]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        url: {type: string, minLength: 1, maxLength: 8192}
        type: {type: string, enum: [seed, asset], default: seed}
        via: {type: [string, 'null'], maxLength: 8192}
        hops: {type: integer, minimum: 0}
        attr: {$ref: '#/components/schemas/Attrs'}
    ClaimedJob:
      allOf:
        - {$ref: '#/components/schemas/JobSpec'}
        - type: object
          required: [attempt_id, lease_expires_at]
          properties:
            attempt_id: {$ref: '#/components/schemas/Identifier'}
            lease_expires_at: {type: integer, format: int64}
    ProjectClaimRequest:
      type: object
      additionalProperties: false
      required: [worker_id, max_jobs, lease_seconds, accept_types]
      properties:
        worker_id: {$ref: '#/components/schemas/Identifier'}
        max_jobs: {type: integer, minimum: 1, maximum: 256}
        lease_seconds: {type: integer, format: int64, minimum: 1, maximum: 3600}
        accept_types: {type: array, maxItems: 16, items: {type: string, enum: [seed, asset]}}
    ProjectClaimResponse:
      type: object
      additionalProperties: false
      required: [project_id, jobs, retry_after_ms]
      properties:
        project_id: {$ref: '#/components/schemas/Identifier'}
        jobs: {type: array, items: {$ref: '#/components/schemas/ClaimedJob'}}
        retry_after_ms: {type: integer, format: int64, minimum: 0}
    Outcome:
      type: object
      additionalProperties: false
      required: [kind, code, uri, meta]
      properties:
        kind: {type: string, enum: [success, http_error, skipped]}
        code: {type: [integer, 'null'], minimum: 0, maximum: 999}
        uri: {type: [string, 'null'], maxLength: 4096}
        meta: {$ref: '#/components/schemas/Attrs'}
    WARCReceipt:
      type: object
      additionalProperties: false
      required: [id, issuer, object_id, sha256, size_bytes, accepted_at, signature]
      properties:
        id: {$ref: '#/components/schemas/Identifier'}
        issuer: {type: string, minLength: 1, maxLength: 512}
        object_id: {type: string, minLength: 1, maxLength: 1024}
        sha256: {type: string, pattern: '^[0-9a-f]{64}$'}
        size_bytes: {type: integer, format: int64, minimum: 1}
        accepted_at: {type: integer, format: int64, minimum: 1}
        signature: {type: string, minLength: 1, maxLength: 4096}
    ProjectCompleteItem:
      type: object
      additionalProperties: false
      required: [job_id, attempt_id, outcome, warc_receipts]
      properties:
        job_id: {$ref: '#/components/schemas/Identifier'}
        attempt_id: {$ref: '#/components/schemas/Identifier'}
        outcome: {$ref: '#/components/schemas/Outcome'}
        warc_receipts: {type: array, maxItems: 16, items: {$ref: '#/components/schemas/WARCReceipt'}}
    ProjectCompleteRequest:
      type: object
      additionalProperties: false
      required: [worker_id, items]
      properties:
        worker_id: {$ref: '#/components/schemas/Identifier'}
        items: {type: array, minItems: 1, maxItems: 256, items: {$ref: '#/components/schemas/ProjectCompleteItem'}}
    ExecutionError:
      type: object
      additionalProperties: false
      required: [code, message, details]
      properties:
        code: {$ref: '#/components/schemas/Identifier'}
        message: {type: string, maxLength: 2048}
        details: {$ref: '#/components/schemas/Attrs'}
    FailItem:
      type: object
      additionalProperties: false
      required: [job_id, attempt_id, retryable, error]
      properties:
        job_id: {$ref: '#/components/schemas/Identifier'}
        attempt_id: {$ref: '#/components/schemas/Identifier'}
        retryable: {type: boolean}
        error: {$ref: '#/components/schemas/ExecutionError'}
    ProjectFailRequest:
      type: object
      additionalProperties: false
      required: [worker_id, items]
      properties:
        worker_id: {$ref: '#/components/schemas/Identifier'}
        items: {type: array, minItems: 1, maxItems: 256, items: {$ref: '#/components/schemas/FailItem'}}
    AttemptRef:
      type: object
      additionalProperties: false
      required: [job_id, attempt_id]
      properties:
        job_id: {$ref: '#/components/schemas/Identifier'}
        attempt_id: {$ref: '#/components/schemas/Identifier'}
    ProjectExtendLeaseRequest:
      type: object
      additionalProperties: false
      required: [worker_id, extend_seconds, items]
      properties:
        worker_id: {$ref: '#/components/schemas/Identifier'}
        extend_seconds: {type: integer, format: int64, minimum: 1, maximum: 3600}
        items: {type: array, minItems: 1, maxItems: 256, items: {$ref: '#/components/schemas/AttemptRef'}}
    ItemResult:
      type: object
      additionalProperties: false
      required: [job_id, attempt_id, status]
      properties:
        job_id: {$ref: '#/components/schemas/Identifier'}
        attempt_id: {$ref: '#/components/schemas/Identifier'}
        status: {type: string, enum: [applied, rejected]}
        job_status: {type: [string, 'null'], enum: [todo, wip, done, failed, reset_exhausted, null]}
        lease_expires_at: {type: [integer, 'null'], format: int64}
        error: {oneOf: [{$ref: '#/components/schemas/APIError'}, {type: 'null'}]}
    BatchResultResponse:
      type: object
      additionalProperties: false
      required: [results]
      properties:
        results: {type: array, items: {$ref: '#/components/schemas/ItemResult'}}
    APIError:
      type: object
      additionalProperties: false
      required: [code, message, retryable, retry_after_ms, details]
      properties:
        code: {type: string}
        message: {type: string}
        retryable: {type: boolean}
        retry_after_ms: {type: integer, format: int64}
        details: {$ref: '#/components/schemas/Attrs'}
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error: {$ref: '#/components/schemas/APIError'}
